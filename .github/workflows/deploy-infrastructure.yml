name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

# Permissions for Federated Identity Credential (Workload Identity Federation)
permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login using Federated Identity Credential (OIDC) - No secrets stored!
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            environmentName=${{ github.event.inputs.environment }}
          deploymentName: 'restaurant-tracker-${{ github.run_number }}'
          failOnStdErr: false

      - name: Get deployment outputs
        id: outputs
        run: |
          outputs=$(az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name 'restaurant-tracker-${{ github.run_number }}' \
            --query 'properties.outputs' \
            -o json)
          
          echo "Static Web App: $(echo $outputs | jq -r '.staticWebAppDefaultHostname.value')"
          echo "Cosmos Endpoint: $(echo $outputs | jq -r '.cosmosEndpoint.value')"
          
          # Output for use in subsequent steps
          echo "swa_hostname=$(echo $outputs | jq -r '.staticWebAppDefaultHostname.value')" >> $GITHUB_OUTPUT
          echo "cosmos_endpoint=$(echo $outputs | jq -r '.cosmosEndpoint.value')" >> $GITHUB_OUTPUT
